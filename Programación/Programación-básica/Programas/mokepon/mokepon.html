<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Mokepon! </title>
        <script src="./js/mokepon.js"></script>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <section id="select-mokepon">
            <h1>Mokepon! 🔥💧🌱</h1>
            <h2>Pick your mokepon</h2>

            <p>
                <label for="hipodoge"> <!-- Indicates to the user the value of the input. `for` stablish the relation between an input an a label trough the `id` -->
                    <input type="radio" name="mokepon" id="hipodoge"/> Hipodoge <!-- I can set this `input` to a group (so they can be related) by using `name="nameOfTheGroup"`-->
                </label>  
                
                <label for="capipe">
                    <input type="radio" name="mokepon" id="capipe"/> Capipe
                </label> 

                <label for="ratike">
                    <input type="radio" name="mokepon" id="ratike"/> Ratike
                </label> 
            </p>

            <button id="btn-mokepon">Pick</button>
        </section> 

        <section id="select-attack">
            <h1>Mokepon! 🔥💧🌱</h1>
            <h2>Pick your attack</h2>

            <p>Your mokepon, <span id="players-mokepon"></span>, has <span id="players-lives">3</span> lives</p>
            <p>Enemy's mokepon, <span id="enemys-mokepon"></span>, has <span id="enemys-lives">3</span> lives</p>

            <p> <!-- It's a good practice set buttons inside of containers-->
                <button id="btn-fire">Fire 🔥</button>
                <button id="btn-water">Water 💧</button>
                <button id="btn-ground">Ground 🌱</button>      
            </p>
        </section>

        <section id="messages">
        </section>

        <section id="Restart game">
            <p>
                <button id="btn-restart">Restart game</button>
            </p>
        </section>
    </body>
</html>
