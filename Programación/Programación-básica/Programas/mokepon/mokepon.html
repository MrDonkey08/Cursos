<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Mokepon! </title>
        <script src="./js/mokepon.js"></script>
    </head>
    <body>
        <h1>Mokepon! 🔥💧🌱</h1>

        <section id="select-mokepon">
            <h2>Pick your mokepon</h2>

            <input type="radio" name="mokepon" id="hipodoge"/> <!-- I can set this `input` to a group (so they can be related) by using `name="nameOfTheGroup"`-->
            <label for="hipodoge">Hipodoge</label> <br> <!-- Indicates to the user the value of the input. `for` stablish the relation between an input an a label trough the `id` -->
            
            <input type="radio" name="mokepon" id="capipe"/>
            <label for="capipe">Capipe</label> <br>

            <input type="radio" name="mokepon" id="ratike"/>
            <label for="ratike">Ratike</label> <br><br>


            <!-- Hipodoge -> Water
            Capipe -> Ground
            Ratik -> Fire
            Langostelvis -> Water and Fire
            Tucapalm -> Water and Ground
            Pydos -> Ground and Fire -->

            <button id="btn-mokepon">Pick</button>
        </section> 

        <section id="select-attack">
            <h2>Pick your attack</h2>
            <p>Your mokepon, <span id="players-mokepon"></span>, has <span id="players-lives">3</span> lives</p> <!-- -->
            <p>Enemy's mokepon, <span id="enemys-mokepon"></span>, has <span id="enemys-lives">3</span> lives</p>
            <p> <!-- It's a good practice set buttons inside of containers-->
                <button id="btn-fire">Fire 🔥</button>
                <button id="btn-water">Water 💧</button>
                <button id="btn-ground">Ground 🌱</button>      
            </p>
        </section>

        <section id="messages">
        </section>

        <section id="Restart game"></section>
            <p>
                <button id="btn-restart">Restart game</button>
            </p>
    </body>
</html>
