<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Mokepon! </title>
        <script src="./js/mokepon.js"></script>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <section id="select-mokepon">
            <h1>Mokepon! 🔥💧🌱</h1>
            <h2>Pick your mokepon</h2>

            <div id="cards-box">
                <label class="mokepon-card" for="acynonyx" id="acynonyx-card"> <!-- Indicates to the user the value of the input. `for` stablish the relation between an input an a label trough the `id` -->
                    <input type="radio" name="mokepon" id="acynonyx"/> Acynonyx <!-- I can set this `input` to a group (so they can be related) by using `name="nameOfTheGroup"`-->
                    <img src="./assets/Acinonyx.png" alt="acynonyx">
                </label>  
                
                <label class="mokepon-card" for="piwith" id="piwith-card">
                    <input type="radio" name="mokepon" id="piwith"/> Piwith
                    <img src="./assets/Piwith.png" alt="piwith">
                </label> 

                <label class="mokepon-card" for="berry" id="berry-card">
                    <input type="radio" name="mokepon" id="berry"/> Berry
                    <img src="./assets/Berry.png" alt="be">
                </label> 
            </div>

            <button id="btn-mokepon">Pick</button>
        </section> 

        <section id="select-attack">
            <h1>Mokepon! 🔥💧🌱</h1>
            <h2>Pick your attack</h2>

            <p>Your mokepon, <span id="players-mokepon"></span>, has <span id="players-lives">3</span> lives</p>
            <p>Enemy's mokepon, <span id="enemys-mokepon"></span>, has <span id="enemys-lives">3</span> lives</p>

            <p> <!-- It's a good practice set buttons inside of containers-->
                <button id="btn-fire">Fire 🔥</button>
                <button id="btn-water">Water 💧</button>
                <button id="btn-ground">Ground 🌱</button>      
            </p>
        </section>

        <section id="messages">
        </section>

        <section id="restart-game">
            <p>
                <button id="btn-restart">Restart game</button>
            </p>
        </section>
    </body>
</html>
