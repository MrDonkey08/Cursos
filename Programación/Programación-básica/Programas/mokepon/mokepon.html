<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<title>Mokepon!</title>
		<link rel="stylesheet" href="./styles.css">
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> // Para que funcionen los media-query en dispositivos móviles
	</head>
	<body>
		<section id="select-mokepon">
			<h1>Mokepon! 🔥💧🌱</h1>
			<h2>Pick your mokepon</h2>

			<div id="cards-box"></div>

			<div><button id="btn-mokepon">Pick</button></div>
		</section> 

		<section id="see-map">
			<h1>Mokepon! 🔥💧🌱</h1>
			<h2 id="map-h2">Walk around the map</h2>
			<canvas id="map"></canvas>
			<button onmouseup="stopMovement()" onmousedown="moveUp()">Up</button>
			<div>
				<button onmouseup="stopMovement()" onmousedown="moveLeft()">Left</button>
				<button onmouseup="stopMovement()" onmousedown="moveDown()">Down</button>
				<button onmouseup="stopMovement()" onmousedown="moveRight()">Right</button>
			</div>
		</section>

		<section id="select-attack">
			<h1>Mokepon! 🔥💧🌱</h1>
			<h2>Pick your attack</h2>

			<div id="attack-buttons">  
			</div>
		</section>

		<section id="battle">
			<h2>Battle</h2>

			<div id="messages"></div>

			<div><button id="btn-restart">Restart game</button></div>

			<div id="battle-cards">
				<div id="players-card" class="battle-card">
					<p><span id="players-mokepon"></span></p>
					<p><span id="players-wins">0</span></p>
				</div>

				<div id="result-card" class="battle-card">
					<p>vs</p>
					<p>👑</p>
				</div>
				
				<div id="enemys-card" class="battle-card">
					<p><span id="enemys-mokepon"></span></p>
					<p><span id="enemys-wins">0</span></p>
				</div>
			</div>
		</section>
        <script src="./js/mokepon.js"></script>
	</body>
</html>
